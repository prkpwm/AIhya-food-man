services:
  - type: web
    name: line-oa-next
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: LIFF_URL
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
